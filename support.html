<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FoodDash | Support Chat</title>
    <style>
        /* Chat-specific styling for a pleasant experience */
        .chat-container {
            max-width: 600px;
            margin: 2rem auto;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-window {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #fdfdfd;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            align-self: flex-start;
            background: #f1f3f5;
            color: var(--dark);
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border 0.3s;
        }

        #userInput:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">FoodDash 🍕</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="split-bill.html">Split Bill</a></li>
            <li><a href="support.html">Support</a></li>
        </ul>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <h3>Support Assistant 🤖</h3>
            <p style="font-size: 0.8rem; opacity: 0.9;">We typically reply in seconds</p>
        </div>

        <div class="chat-window" id="chatBox">
            <div class="msg bot-msg">Namaste! Welcome to FoodDash Support. How can I help you with your order today?</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your message here...">
            <button class="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
